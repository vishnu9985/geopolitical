<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirCanvas AI | Gesture-Controlled Art Studio</title>
    
    <!-- MediaPipe Libraries via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-color: #6366f1;
            --accent-color: #ec4899;
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --text-color: #f8fafc;
            --border-radius: 12px;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevent selection while drawing */
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Application Container */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Video & Canvas Layers */
        .canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #output_canvas {
            z-index: 2; /* Drawing layer */
        }

        #video_input {
            z-index: 1; /* Camera feed layer */
            opacity: 0.6; /* Dim video to make drawing pop */
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas elements if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
        }

        .status-badge {
            background: var(--panel-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ef4444; /* Red = Off */
            box-shadow: 0 0 8px #ef4444;
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background-color: #22c55e; /* Green = On */
            box-shadow: 0 0 8px #22c55e;
        }

        /* Toolbar */
        .toolbar {
            pointer-events: auto;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: var(--border-radius);
            display: flex;
            gap: 20px;
            align-items: center;
            align-self: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .tool-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        /* Controls */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #fff; border-radius: 50%; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        button.primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        button.primary:hover {
            background: #4f46e5;
        }

        button.danger {
            background: #ef4444;
            border-color: #ef4444;
        }
        button.danger:hover {
            background: #dc2626;
        }

        /* Instructions Modal / Overlay */
        .overlay-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            z-index: 20;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.5s ease;
        }

        .overlay-message.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .instruction-steps {
            text-align: left;
            margin: 20px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
        }
        
        .instruction-steps li {
            margin-bottom: 8px;
            list-style: none;
        }
        
        .instruction-steps li::before {
            content: "•";
            color: var(--accent-color);
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }

        /* Toast Notification */
        .toast {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            font-weight: 500;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Labels */
        label { font-size: 0.8rem; color: #94a3b8; margin-right: 5px; }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- Loading / Instructions Overlay -->
        <div id="loadingOverlay" class="overlay-message">
            <div class="loader"></div>
            <h2 id="overlayTitle">Initializing AI Model...</h2>
            <div class="instruction-steps">
                <p>Please allow camera access to enable hand tracking.</p>
            </div>
        </div>

        <!-- The Webcam Video (Hidden visually, used for processing) -->
        <video id="video_input" class="canvas-layer" playsinline></video>
        
        <!-- The Output Canvas (Shows skeleton + Drawing) -->
        <canvas id="output_canvas" class="canvas-layer"></canvas>

        <!-- UI Layer -->
        <div class="ui-layer">
            <header>
                <h1>AirCanvas AI</h1>
                <div class="status-badge">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Loading</span>
                </div>
            </header>

            <div class="toolbar">
                <div class="tool-group">
                    <label>Color</label>
                    <input type="color" id="colorPicker" value="#ec4899">
                </div>
                
                <div class="tool-group">
                    <label>Size</label>
                    <input type="range" id="sizePicker" min="2" max="30" value="8">
                </div>

                <div class="tool-group">

                        Clear
                    </button>
                    <button class="primary" id="saveBtn">
                        <svg width="16
